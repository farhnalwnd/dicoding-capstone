name: HIREZY CI/CD

on:
  push:
    branches: [main, develop, dev, hirezy]
  pull_request:
    branches: [main, develop, hirezy]

jobs:
  # === JOB 1: Lint ===
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lint tools
        run: pip install flake8 "black>=26.5.0" "isort>=6.0.0"
      - name: Run flake8
        run: cd backend && flake8 app/ --max-line-length=120 --exclude=__pycache__
      - name: Check black formatting
        run: cd backend && black --check app/
      - name: Check import sorting
        run: cd backend && isort --check-only --profile black app/

  # === JOB 2: Unit Tests (Mock) ===
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests with coverage
        run: |
          cd backend
          python -m pytest test -v --cov=app --cov-report=term --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # === JOB 3: Docker Build ===
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build -t hirezy-backend ./backend
      - name: Build Frontend Image
        run: docker build -t hirezy-frontend ./frontend
      - name: Validate Docker Compose
        run: docker compose config

  # === JOB 4: Model Validation ===
  model-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download fine-tuned model
        run: |
          pip install huggingface_hub
          # Download the model from the user's Hugging Face account
          huggingface-cli download lord-amir26/bi-encoder-cv-matcher --local-dir models/bi-encoder-cv-matcher
      - name: Run model validation
        run: |
          cd backend
          pip install -r requirements.txt
          python -m pytest test/test_model_validation.py -v
