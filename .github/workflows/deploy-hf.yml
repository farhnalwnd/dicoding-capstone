name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - hirezy
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-hf.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push backend folder to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set! Please add it to your GitHub repository secrets."
            exit 1
          fi
          
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force push only the backend folder to Hugging Face
          git remote add hf https://lord-amir26:$HF_TOKEN@huggingface.co/spaces/lord-amir26/hirezy
          git subtree push --prefix backend hf main
